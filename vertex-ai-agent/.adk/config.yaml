apiVersion: v1
kind: AgentEngineConfig
metadata:
  name: mcp-agent
spec:
  displayName: mcp-agent
  description: "MCP Agent - Connects to MCP Server"
  region: your-region
  projectId: your-project-id

  entryPoint:
    module: agent.agent
    object: app

  agent:
    model: mcp-client-model
    name: mcp_agent

  build:
    runtimeVersion: python311
    pythonVersion: "3.11"
    pythonModules:
      - google-adk>=0.3.1
      - google-cloud-aiplatform[agent_engines,adk]>=1.112.0
      - mcp>=1.6.1
      - anyio>=4.3.0
      - python-dotenv
      - httpx>=0.24.0
      - aiohttp>=3.9.0
      - PyYAML>=6.0
