apiVersion: v1
kind: AgentEngineConfig
spec:
  displayName: Your-MCP-Display-Name
  description: "MCP Agent - Connects to MCP Server"
  region: your-region
  projectId: your-project-id

  entryPoint:
    module: agent.agent
    object: app

  agent:
    model: gemini-3.1-pro-preview
    region: global

  build:
    runtimeVersion: python311
    pythonVersion: "3.11"
    pythonModules:
      - google-adk>=0.3.1
      - google-cloud-aiplatform[agent_engines,adk]>=1.112.0
      - mcp>=1.6.1
      - anyio>=4.3.0
      - python-dotenv
      - httpx>=0.24.0
      - aiohttp>=3.9.0
      - PyYAML>=6.0
